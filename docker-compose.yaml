services:
  location-database:
    image: postgis/postgis:16-3.4
    container_name: location-database

    environment:
      POSTGRES_DB: ${DATASOURCE_NAME}
      POSTGRES_USER: ${DATASOURCE_USERNAME}
      POSTGRES_PASSWORD: ${DATASOURCE_PASSWORD}

    ports:
      - "5432:5432"

    volumes:
      - location-db-data:/var/lib/postgresql/data

volumes:
  location-db-data: